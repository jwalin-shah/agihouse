# Ambient agent policy — deterministic guardrails.
#
# These are HARD rules. The model never overrides them. Every decision the
# agent makes is checked against this file and logged to audit.log so you
# can audit exactly what the agent did and why.
#
# To rehearse without HUD output, set mode to "dry_run".

mode: live          # live | dry_run    (dry_run logs everything, suppresses notify)
log_path: audit.log

# --- allowed surface -----------------------------------------------------
# Actions the agent is ALLOWED to consider. Write-shaped actions still become
# proposals unless listed in execution.auto_fire_actions below.
allowed_actions:
  - recall          # surface a person-memory digest on HUD
  - departure_nudge # "leave in N min" + context whisper for upcoming event
  - commitment_log  # note an in-conversation commitment to a local file
  - send_imessage
  - schedule_imessage
  - create_reminder
  - add_calendar_event
  - add_note
  - list_reminders
  - list_calendar
  - list_notes
  - list_memories
  - remember_fact
  - answer_question

# Explicitly denied — listed to make the no-go surface visible to a reviewer.
denied_actions:
  - send_email
  - delete_anything
  - share_externally

# --- execution -----------------------------------------------------------
# Only these actions execute immediately after policy approval. All other
# allowed actions are shown as HUD proposals for the wearer to decide on.
execution:
  auto_fire_actions:
    - list_reminders
    - list_calendar
    - list_notes
    - list_memories
    - answer_question

# --- restraint rules -----------------------------------------------------
restraint:
  # Don't surface the same person twice within this many seconds.
  recall_cooldown_seconds: 5
  # Don't surface a person we've never exchanged messages with.
  require_prior_correspondence: true
  # Maximum proposals per minute across ALL actions (anti-spam ceiling).
  max_proposals_per_minute: 4

# --- privacy rules -------------------------------------------------------
privacy:
  # Names/keywords the agent must NEVER surface, even if matched.
  denylist_names: []
  denylist_keywords:
    - therapist
    - lawyer
    - HR
  # If transcript matches any of these, suppress all proposals (sensitive context).
  suppress_in_contexts:
    - "off the record"
    - "between us"
    - "don't tell"
